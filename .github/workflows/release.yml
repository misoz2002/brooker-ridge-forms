name: Build immutable WordPress plugin release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read and validate plugin version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^ \* Version: //p' brooker-ridge-forms.php | head -n1)"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Package and validate plugin
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p dist/brooker-ridge-forms/assets
          cp brooker-ridge-forms.php README.txt google-apps-script.js dist/brooker-ridge-forms/
          cp assets/forms.css assets/forms.js dist/brooker-ridge-forms/assets/
          cd dist
          zip -qr "brooker-ridge-forms-$version.zip" brooker-ridge-forms
          test "$(zipinfo -1 "brooker-ridge-forms-$version.zip" | cut -d/ -f1 | sort -u)" = "brooker-ridge-forms"
          cp "brooker-ridge-forms-$version.zip" brooker-ridge-forms.zip
          test "$(sha256sum "brooker-ridge-forms-$version.zip" | cut -d' ' -f1)" = "$(sha256sum brooker-ridge-forms.zip | cut -d' ' -f1)"
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          asset="dist/brooker-ridge-forms-$version.zip"
          compatibility_asset="dist/brooker-ridge-forms.zip"
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "Release v$version already exists; leaving its immutable asset unchanged."
            exit 0
          fi
          gh release create "v$version" "$asset" "$compatibility_asset" \
            --title "Brooker Ridge Forms v$version" \
            --notes "Validated WordPress plugin release. The versioned ZIP is canonical; the identical compatibility asset lets installed 2.0.2 copies migrate to the versioned updater. Both contain one top-level brooker-ridge-forms folder."
